function normalizeWhitespace(value) {
  return String(value || "").replace(/\s+/g, " ").trim();
}

function formatCount(value) {
  const parsed = Number(value);
  if (!Number.isFinite(parsed)) return "0";
  return parsed.toLocaleString("ca-ES");
}

function formatPercent(value) {
  const parsed = Number(value);
  if (!Number.isFinite(parsed)) return "0,0";
  return parsed.toLocaleString("ca-ES", {
    minimumFractionDigits: 1,
    maximumFractionDigits: 1
  });
}

function resolveCourseCount(detailJson, fallbackValue) {
  const candidates = [
    detailJson?.n_courses,
    detailJson?.total_courses,
    detailJson?.n_assignatures,
    detailJson?.total_assignatures,
    detailJson?.summary?.n_courses,
    detailJson?.summary?.total_courses,
    detailJson?.meta?.n_courses,
    detailJson?.meta?.total_courses,
    Array.isArray(detailJson?.courses) ? detailJson.courses.length : null,
    fallbackValue
  ];

  for (let index = 0; index < candidates.length; index += 1) {
    const parsed = Number(candidates[index]);
    if (Number.isFinite(parsed) && parsed > 0) return Math.floor(parsed);
  }

  for (let index = 0; index < candidates.length; index += 1) {
    const parsed = Number(candidates[index]);
    if (Number.isFinite(parsed) && parsed >= 0) return Math.floor(parsed);
  }

  return 0;
}

function setExplainerText(element, text) {
  if (!element) return;
  const normalized = normalizeWhitespace(text);
  element.textContent = normalized;
  element.hidden = normalized.length === 0;
}

function normalizeSystemId(systemId) {
  if (systemId === "ens:equal") return "sys:ensemble_equal";
  if (systemId === "ens:third") return "sys:ensemble_third";
  if (systemId === "ens:triple") return "sys:ensemble_triple";
  return String(systemId || "");
}

function normalizeSdgCodeToOds(code) {
  return String(code || "").replace(/^SDG-/, "ODS-");
}

function programmeKey(centreCode, programmeCode) {
  return `${String(centreCode || "")}::${String(programmeCode || "")}`;
}

function readSharedFilters() {
  const fallback = {
    centreCode: "",
    programmeKey: "",
    systemId: DEFAULT_SYSTEM_ID,
    sectionId: DEFAULT_SECTION_ID
  };
  const store = window.SDGFilterMemory;
  if (!store || typeof store.read !== "function") return fallback;
  const raw = store.read() || {};
  return {
    centreCode: String(raw.centreCode || ""),
    programmeKey: String(raw.programmeKey || ""),
    systemId: normalizeSystemId(String(raw.systemId || DEFAULT_SYSTEM_ID)) || DEFAULT_SYSTEM_ID,
    sectionId: String(raw.sectionId || DEFAULT_SECTION_ID) || DEFAULT_SECTION_ID
  };
}

function writeSharedFilters(patch) {
  const store = window.SDGFilterMemory;
  if (!store || typeof store.write !== "function") return null;
  const payload = { ...(patch || {}) };
  if (Object.prototype.hasOwnProperty.call(payload, "systemId")) {
    payload.systemId = normalizeSystemId(payload.systemId) || DEFAULT_SYSTEM_ID;
  }
  if (Object.prototype.hasOwnProperty.call(payload, "sectionId")) {
    payload.sectionId = String(payload.sectionId || DEFAULT_SECTION_ID) || DEFAULT_SECTION_ID;
  }
  return store.write(payload);
}

function addOption(selectEl, value, label) {
  const option = document.createElement("option");
  option.value = String(value || "");
  option.textContent = normalizeWhitespace(label);
  selectEl.appendChild(option);
}

function joinUrl(...parts) {
  return parts
    .filter((part) => part != null && String(part).trim() !== "")
    .map((part, idx) => {
      const chunk = String(part).trim();
      if (idx === 0) return chunk.replace(/\/+$/, "");
      return chunk.replace(/^\/+/, "");
    })
    .join("/");
}

async function fetchJson(url) {
  const response = await fetch(url, { cache: "no-cache" });
  if (!response.ok) throw new Error(`HTTP ${response.status} (${url})`);
  return response.json();
}

async function fetchApiJson(relativePath) {
  return fetchJson(joinUrl(state.apiBase, relativePath));
}

async function resolveApiBaseAndVersion() {
  let lastError = null;
  for (const base of API_BASE_CANDIDATES) {
    try {
      const versions = await fetchJson(joinUrl(base, "versions.json"));
      const latest = normalizeWhitespace(versions?.latest);
      if (!latest) throw new Error("versions.json sense camp latest");
      state.apiBase = base;
      state.apiVersion = latest;
      return;
    } catch (err) {
      lastError = err;
    }
  }
  throw lastError || new Error("No s'ha pogut resoldre l'API.");
}

async function loadIndexes() {
  const prefix = state.apiVersion;
  const [centres, programmes, systemsJson, sectionsJson] = await Promise.all([
    fetchApiJson(`${prefix}/index/centres.json`),
    fetchApiJson(`${prefix}/index/programmes.json`),
    fetchApiJson(`${prefix}/index/systems.json`),
    fetchApiJson(`${prefix}/index/sections.json`)
  ]);

  state.centres = (Array.isArray(centres) ? centres : [])
    .map((row) => ({
      centre_code: String(row?.centre_code || ""),
      centre_name: normalizeWhitespace(row?.centre_name),
      json: String(row?.json || ""),
      n_courses: Number(row?.n_courses || 0),
      n_programmes: Number(row?.n_programmes || 0)
    }))
    .filter((row) => row.centre_code && row.centre_name && row.json)
    .sort((a, b) => a.centre_name.localeCompare(b.centre_name, "ca"));
  state.centreByCode = new Map(state.centres.map((row) => [row.centre_code, row]));

  state.programmesByCentreCode = new Map();
  state.programmeByKey = new Map();
  (Array.isArray(programmes) ? programmes : []).forEach((row) => {
    const programme = {
      centre_code: String(row?.centre_code || ""),
      centre_name: normalizeWhitespace(row?.centre_name),
      programme_code: String(row?.programme_code || ""),
      programme_name: normalizeWhitespace(row?.programme_name),
      n_courses: Number(row?.n_courses || 0),
      json: String(row?.json || "")
    };
    if (!programme.centre_code || !programme.programme_code || !programme.programme_name || !programme.json) return;

    const key = programmeKey(programme.centre_code, programme.programme_code);
    if (!state.programmesByCentreCode.has(programme.centre_code)) {
      state.programmesByCentreCode.set(programme.centre_code, []);
    }
    state.programmesByCentreCode.get(programme.centre_code).push(programme);
    state.programmeByKey.set(key, programme);
  });

  for (const [centreCode, items] of state.programmesByCentreCode.entries()) {
    items.sort((a, b) => a.programme_name.localeCompare(b.programme_name, "ca"));
    state.programmesByCentreCode.set(centreCode, items);
  }

  state.systemOptions = Array.isArray(systemsJson?.system_options) ? systemsJson.system_options : [];
  state.sectionOptions = Array.isArray(sectionsJson?.section_options) ? sectionsJson.section_options : [];
}

function populateFacultySelect(selectedCentreCode) {
  facultySelect.innerHTML = "";
  addOption(facultySelect, "", FACULTY_PLACEHOLDER_LABEL);
  state.centres.forEach((centre) => addOption(facultySelect, centre.centre_code, centre.centre_name));

  const selected = String(selectedCentreCode || "");
  facultySelect.value = state.centreByCode.has(selected) ? selected : "";
}

function populateDegreeSelect(centreCode, selectedProgrammeKey) {
  degreeSelect.innerHTML = "";

  const placeholder = document.createElement("option");
  placeholder.value = "";
  placeholder.textContent = PROGRAMME_PLACEHOLDER_LABEL;
  placeholder.disabled = true;
  degreeSelect.appendChild(placeholder);

  const allOption = document.createElement("option");
  allOption.value = "ALL";
  allOption.textContent = "Tots";
  degreeSelect.appendChild(allOption);

  const centreKey = String(centreCode || "");
  const programmes = state.programmesByCentreCode.get(centreKey) || [];
  const validProgrammeKeys = new Set();

  programmes.forEach((programme) => {
    const key = programmeKey(programme.centre_code, programme.programme_code);
    validProgrammeKeys.add(key);
    addOption(degreeSelect, key, programme.programme_name);
  });

  degreeSelect.disabled = !centreKey;
  if (!centreKey) {
    degreeSelect.value = "";
    return;
  }

  const selected = String(selectedProgrammeKey || "");
  if (selected && (selected === "ALL" || validProgrammeKeys.has(selected))) {
    degreeSelect.value = selected;
  } else {
    degreeSelect.value = "";
  }
}

function populateSystemSelect(selectedSystemId) {
  systemSelect.innerHTML = "";
  state.systemOptions.forEach((row) => {
    const id = String(row?.id || "");
    const label = SYSTEM_LABEL_OVERRIDES[id] || normalizeWhitespace(row?.label || id);
    addOption(systemSelect, id, label);
  });

  const selected = normalizeSystemId(selectedSystemId);
  const resolvedOption = state.systemOptions.find((row) => normalizeSystemId(String(row?.id || "")) === selected);
  const fallback = state.systemOptions[0] ? String(state.systemOptions[0].id || "") : "";
  systemSelect.value = resolvedOption ? String(resolvedOption?.id || "") : fallback;
}

function populateSectionSelect(selectedSectionId) {
  sectionSelect.innerHTML = "";
  state.sectionOptions.forEach((row) => {
    const id = String(row?.id || "");
    const label = SECTION_LABEL_OVERRIDES[id] || normalizeWhitespace(row?.label || id);
    addOption(sectionSelect, id, label);
  });

  const selected = String(selectedSectionId || "");
  const fallback = state.sectionOptions[0] ? String(state.sectionOptions[0].id || "") : "";
  const hasSelected = state.sectionOptions.some((row) => String(row?.id || "") === selected);
  sectionSelect.value = hasSelected ? selected : fallback;

function clearCharts() {
  state.charts.forEach((chart) => {
    try {
      chart.destroy();
    } catch (_) {}
  });
  state.charts = [];
}

function syncRadarChartHeaderHeights() {
  if (!chartContainer) return;
  const headerEls = Array.from(chartContainer.querySelectorAll(".radar-chart-header"));
  headerEls.forEach((element) => {
    element.style.minHeight = "";
  });
  if (headerEls.length < 2) return;

  const maxHeaderHeight = Math.max(
    ...headerEls.map((element) => Math.ceil(element.getBoundingClientRect().height))
  );
  if (!Number.isFinite(maxHeaderHeight) || maxHeaderHeight <= 0) return;

  headerEls.forEach((element) => {
    element.style.minHeight = `${maxHeaderHeight}px`;
  });
}

function scheduleRadarChartHeaderHeightsSync() {
  if (radarHeaderSyncRafId && typeof window.cancelAnimationFrame === "function") {
    window.cancelAnimationFrame(radarHeaderSyncRafId);
  }

  if (typeof window.requestAnimationFrame === "function") {
    radarHeaderSyncRafId = window.requestAnimationFrame(() => {
      radarHeaderSyncRafId = null;
      syncRadarChartHeaderHeights();
    });
    return;
  }

  syncRadarChartHeaderHeights();
}

function resizeChartsForLayoutChange() {
  if (!Array.isArray(state.charts) || state.charts.length === 0) return;
  state.charts.forEach((chart) => {
    try {
      chart.resize();
      if (typeof chart.update === "function") {
        chart.update("none");
      }
    } catch (_) {}
  });
}

function scheduleChartResizeForLayoutChange() {
  const runLayoutReflow = () => {
    resizeChartsForLayoutChange();
    scheduleRadarChartHeaderHeightsSync();
  };

  if (typeof window.requestAnimationFrame === "function") {
    window.requestAnimationFrame(() => {
      window.requestAnimationFrame(runLayoutReflow);
    });
  } else {
    runLayoutReflow();
  }

  if (radarLayoutResizeTimer) {
    clearTimeout(radarLayoutResizeTimer);
  }
  radarLayoutResizeTimer = setTimeout(() => {
    radarLayoutResizeTimer = null;
    runLayoutReflow();
  }, 170);
}

function observeRadarSidebarLayoutState() {
  if (typeof MutationObserver === "undefined" || !document.body || radarSidebarClassObserver) return;

  let lastBodyClassName = document.body.className;
  radarSidebarClassObserver = new MutationObserver(() => {
    const currentBodyClassName = document.body.className;
    if (currentBodyClassName === lastBodyClassName) return;
    lastBodyClassName = currentBodyClassName;
    scheduleChartResizeForLayoutChange();
  });
  radarSidebarClassObserver.observe(document.body, {
    attributes: true,
    attributeFilter: ["class"]
  });
}

function isCompactRadarLayout() {
  return window.matchMedia("(max-width: 992px)").matches;
}

function applyExplainerPanelCollapseUi() {
  const isCompact = isCompactRadarLayout();
  const panelVisible = Boolean(state.panelVisible);
  const panelExpanded = panelVisible && !state.panelCollapsed;
  const panelMinimized = panelVisible && state.panelCollapsed && !isCompact;
  const hidePanelColumn = !panelVisible;

  if (radarShellEl) {
    radarShellEl.classList.toggle("radar-shell--panel-collapsed", hidePanelColumn);
    radarShellEl.classList.toggle("radar-shell--panel-minimized", panelMinimized);
  }
  if (explainerPanelEl) {
    explainerPanelEl.hidden = hidePanelColumn;
    explainerPanelEl.classList.toggle("radar-explainer--minimized", panelMinimized);
  }
  if (explainerBodyEl) {
    explainerBodyEl.hidden = !panelExpanded;
  }
  if (radarPanelToggleBtn) {
    const label = panelExpanded ? "Oculta l'explicació" : "Mostra l'explicació";
    radarPanelToggleBtn.hidden = !panelVisible;
    radarPanelToggleBtn.setAttribute("aria-expanded", String(panelExpanded));
    radarPanelToggleBtn.setAttribute("aria-label", label);
    radarPanelToggleBtn.setAttribute("title", label);
  }
  if (radarPanelToggleIconEl) {
    radarPanelToggleIconEl.className = panelExpanded
      ? "fa fa-minus explainer-toggle-icon radar-panel-toggle-icon"
      : "fa fa-plus explainer-toggle-icon radar-panel-toggle-icon";
  }

  scheduleChartResizeForLayoutChange();
}

function setExplainerPanelCollapsed(isCollapsed) {
  state.panelCollapsed = Boolean(isCollapsed);
  applyExplainerPanelCollapseUi();
}

function setExplainerPanelVisible(isVisible) {
  state.panelVisible = Boolean(isVisible);
  applyExplainerPanelCollapseUi();
}

function setRadarIntroPanelExpanded(isExpanded) {
  if (!radarIntroToggleBtn || !radarIntroPanelEl) return;
  const expanded = Boolean(isExpanded);
  radarIntroPanelEl.hidden = !expanded;
  radarIntroToggleBtn.setAttribute("aria-expanded", String(expanded));
  if (radarIntroToggleIconEl) {
    radarIntroToggleIconEl.className = expanded
      ? "fa fa-minus explainer-toggle-icon radar-info-toggle-icon"
      : "fa fa-plus explainer-toggle-icon radar-info-toggle-icon";
  }
}

function getCourseOdsSet(course, systemId, sectionId) {
  const recognised = course?.sdg_compact?.[String(systemId || "")]?.[String(sectionId || "")];
  const rawList = Array.isArray(recognised)
    ? recognised
    : (typeof recognised === "string" && normalizeWhitespace(recognised) ? [recognised] : []);

  const normalized = rawList
    .map((code) => normalizeSdgCodeToOds(code))
    .filter((code) => Object.prototype.hasOwnProperty.call(odsDefinitions, code));

  return new Set(normalized);
}

function buildRadarDistributionFromCourses(coursesInput, systemId, sectionId) {
  const courses = Array.isArray(coursesInput) ? coursesInput : [];
  const totalCourses = courses.length;

  const counts = {};
  ODS_ORDER.forEach((odsCode) => {
    counts[odsCode] = 0;
  });

  let coursesWithOds = 0;
  courses.forEach((course) => {
    const odsSet = getCourseOdsSet(course, systemId, sectionId);
    if (odsSet.size > 0) coursesWithOds += 1;
    odsSet.forEach((odsCode) => {
      if (Object.prototype.hasOwnProperty.call(counts, odsCode)) {
        counts[odsCode] += 1;
      }
    });
  });

  const percentages = {};
  ODS_ORDER.forEach((odsCode) => {
    percentages[odsCode] = totalCourses > 0
      ? Number(((counts[odsCode] * 100) / totalCourses).toFixed(1))
      : 0;
  });

  const coveragePct = totalCourses > 0 ? Number(((coursesWithOds * 100) / totalCourses).toFixed(1)) : 0;
  return {
    labels: ODS_ORDER.slice(),
    counts,
    percentages,
    totalCourses,
    coursesWithOds,
    coveragePct
  };
}

function buildRadarDistribution(detailJson, systemId, sectionId) {
  const courses = Array.isArray(detailJson?.courses) ? detailJson.courses : [];
  return buildRadarDistributionFromCourses(courses, systemId, sectionId);
}

function getDistributionMaxPercentage(distribution) {
  const labels = Array.isArray(distribution?.labels) ? distribution.labels : [];
  if (!labels.length) return 0;
  return labels.reduce((maxValue, odsCode) => {
    const value = Number(distribution?.percentages?.[odsCode] || 0);
    if (!Number.isFinite(value)) return maxValue;
    return Math.max(maxValue, value);
  }, 0);
}

function getNiceRadarStep(rawStep) {
  const parsed = Number(rawStep);
  if (!Number.isFinite(parsed) || parsed <= 1) return 1;
  if (parsed <= 2) return 2;
  if (parsed <= 5) return 5;
  if (parsed <= 10) return 10;
  if (parsed <= 20) return 20;
  return 25;
}

function buildSharedRadarScale(distributions) {
  const valid = (Array.isArray(distributions) ? distributions : []).filter(Boolean);
  if (!valid.length) {
    return { min: 0, max: 100, stepSize: 20 };
  }

  const maxDetected = valid.reduce((maxValue, distribution) => {
    return Math.max(maxValue, getDistributionMaxPercentage(distribution));
  }, 0);
  const clampedMaxDetected = Math.max(0, Math.min(100, maxDetected));
  const paddedTarget = clampedMaxDetected > 0
    ? Math.min(100, clampedMaxDetected * 1.12)
    : 5;

  const rawStep = paddedTarget / 5;
  const stepSize = getNiceRadarStep(rawStep);
  let axisMax = Math.ceil(Math.max(paddedTarget, clampedMaxDetected) / stepSize) * stepSize;

  axisMax = Math.max(5, Math.min(100, axisMax));
  if (axisMax < stepSize) {
    axisMax = stepSize;
  }

  return {
    min: 0,
    max: axisMax,
    stepSize
  };
}

function getRadarPointLabelBoxes(chart) {
  const scale = chart?.scales?.r;
  const labels = Array.isArray(chart?.data?.labels) ? chart.data.labels : [];
  if (!scale || !labels.length) return [];

  const boxes = [];
  const ctx = chart?.ctx;
  if (!ctx) return [];

  const originalFont = ctx.font;
  const pointLabelFont = scale?._pointLabelFont?.string;
  if (pointLabelFont) ctx.font = pointLabelFont;

  const padding = Number(scale?.options?.pointLabels?.padding || 0);
  labels.forEach((label, idx) => {
    const text = String(label || "");
    const textWidth = Number(ctx.measureText(text).width || 0);
    const fontSize = Number(scale?._pointLabelFont?.size || scale?.options?.pointLabels?.font?.size || 12);
    const metrics = ctx.measureText(text);
    const ascent = Number(metrics.actualBoundingBoxAscent || fontSize * 0.72);
    const descent = Number(metrics.actualBoundingBoxDescent || fontSize * 0.28);
    const boxHeight = Math.max(fontSize + 8, ascent + descent + 8);
    const boxWidth = Math.max(46, textWidth + 18);
    const radialDistance = Number(scale.drawingArea || 0) + padding + 6;
    const anchor = typeof scale.getPointPosition === "function"
      ? scale.getPointPosition(idx, radialDistance)
      : null;
    if (!anchor || !Number.isFinite(anchor.x) || !Number.isFinite(anchor.y)) return;
    boxes.push({
      index: idx,
      left: anchor.x - (boxWidth / 2),
      right: anchor.x + (boxWidth / 2),
      top: anchor.y - (boxHeight / 2),
      bottom: anchor.y + (boxHeight / 2)
    });
  });

  ctx.font = originalFont;
  return boxes;
}

function findRadarPointLabelIndexAtEvent(chart, event, extraPadding) {
  if (!chart || !event) return -1;
  const x = Number(event.x);
  const y = Number(event.y);
  if (!Number.isFinite(x) || !Number.isFinite(y)) return -1;

  const pad = Number(extraPadding || 0);
  const boxes = getRadarPointLabelBoxes(chart);
  for (let idx = 0; idx < boxes.length; idx += 1) {
    const box = boxes[idx];
    if (!box) continue;
    if (
      x >= (Number(box.left) - pad)
      && x <= (Number(box.right) + pad)
      && y >= (Number(box.top) - pad)
      && y <= (Number(box.bottom) + pad)
    ) {
      return Number(box.index);
    }
  }
  return -1;
}

const radarPointLabelTooltipPlugin = {
  id: "radarPointLabelTooltipPlugin",
  afterEvent(chart, args) {
    const event = args?.event;
    if (!event) return;

    const eventType = String(event.type || "");
    const validEvents = new Set(["mousemove", "touchmove", "click", "mouseout", "touchend", "touchcancel"]);
    if (!validEvents.has(eventType)) return;

    const datasetMeta = chart.getDatasetMeta(0);
    const points = Array.isArray(datasetMeta?.data) ? datasetMeta.data : [];
    if (!points.length) return;

    const hoverState = chart.$radarPointLabelHoverState || { forced: false, index: -1 };
    chart.$radarPointLabelHoverState = hoverState;

    const labelIndex = eventType === "mouseout"
      ? -1
      : findRadarPointLabelIndexAtEvent(chart, event, 12);

    if (labelIndex >= 0 && labelIndex < points.length) {
      if (!hoverState.forced || hoverState.index !== labelIndex) {
        const pointEl = points[labelIndex];
        const anchor = {
          x: Number(event?.x || pointEl?.x || 0),
          y: Number(event?.y || pointEl?.y || 0)
        };
        const active = [{ datasetIndex: 0, index: labelIndex }];
        chart.setActiveElements(active);
        chart.tooltip.setActiveElements(active, anchor);
        hoverState.forced = true;
        hoverState.index = labelIndex;
        args.changed = true;
      }
      return;
    }

    if (hoverState.forced) {
      hoverState.forced = false;
      hoverState.index = -1;
      chart.setActiveElements([]);
      chart.tooltip.setActiveElements([], { x: Number(event?.x || 0), y: Number(event?.y || 0) });
      args.changed = true;
    }
  }
};

function hexToRgba(hexColor, alpha) {
  const normalized = String(hexColor || "").trim().replace(/^#/, "");
  const safeAlpha = Math.max(0, Math.min(1, Number(alpha)));
  if (!normalized) return `rgba(127,127,127,${safeAlpha})`;

  let r;
  let g;
  let b;
  if (normalized.length === 3) {
    r = parseInt(normalized[0] + normalized[0], 16);
    g = parseInt(normalized[1] + normalized[1], 16);
    b = parseInt(normalized[2] + normalized[2], 16);
  } else if (normalized.length === 6) {
    r = parseInt(normalized.slice(0, 2), 16);
    g = parseInt(normalized.slice(2, 4), 16);
    b = parseInt(normalized.slice(4, 6), 16);
  } else {
    return `rgba(127,127,127,${safeAlpha})`;
  }

  if (![r, g, b].every((value) => Number.isFinite(value))) {
    return `rgba(127,127,127,${safeAlpha})`;
  }

  return `rgba(${r},${g},${b},${safeAlpha})`;
}

function makeRadarChartCard({ title, subtitle, distribution, seriesLabel, lineColor, axisScale }, mountEl) {
  const card = document.createElement("div");
  card.className = "chart-container";
  const canvasId = `radar-chart-${Math.random().toString(16).slice(2)}`;
  card.innerHTML = `
    <div class="radar-chart-header">
      <h3 class="radar-chart-title">${title}</h3>
      <p class="radar-chart-subtitle">${subtitle}</p>
    </div>
    <div class="chart-wrapper">
      <canvas id="${canvasId}"></canvas>
    </div>
  `;
  mountEl.appendChild(card);

  const labels = distribution.labels || [];
  const values = labels.map((odsCode) => Number(distribution?.percentages?.[odsCode] || 0));
  const resolvedScale = axisScale && Number.isFinite(axisScale.max) && Number.isFinite(axisScale.stepSize)
    ? axisScale
    : { min: 0, max: 100, stepSize: 20 };

  const ctx = document.getElementById(canvasId).getContext("2d");
  const chart = new Chart(ctx, {
    type: "radar",
    plugins: [radarPointLabelTooltipPlugin],
    data: {
      labels,
      datasets: [
        {
          label: seriesLabel,
          data: values,
          countsMap: distribution.counts || {},
          totalCourses: Number(distribution.totalCourses || 0),
          borderColor: lineColor,
          backgroundColor: hexToRgba(lineColor, 0.2),
          pointBackgroundColor: labels.map((odsCode) => odsColors[odsCode] || lineColor),
          pointBorderColor: "#ffffff",
          pointHoverBackgroundColor: "#ffffff",
          pointHoverBorderColor: lineColor,
          borderWidth: 2.3,
          pointRadius: 3.4,
          pointHoverRadius: 4.6,
          fill: true
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      elements: {
        line: {
          tension: 0.2
        }
      },
      scales: {
        r: {
          min: Number(resolvedScale.min || 0),
          max: Number(resolvedScale.max || 100),
          ticks: {
            stepSize: Number(resolvedScale.stepSize || 20),
            color: "#4f6074",
            backdropColor: "rgba(255,255,255,0)",
            callback(value) {
              return `${value}%`;
            }
          },
          grid: {
            color: "rgba(69, 89, 112, 0.22)"
          },
          angleLines: {
            color: "rgba(69, 89, 112, 0.2)"
          },
          pointLabels: {
            color: "#273648",
            font: {
              size: 11,
              weight: "700"
            }
          }
        }
      },
      plugins: {
        legend: {
          display: false
        },
        tooltip: {
          enabled: true,
          displayColors: false,
          backgroundColor: "rgba(24, 36, 52, 0.94)",
          titleColor: "#ffffff",
          bodyColor: "#ffffff",
          borderColor: "rgba(255, 255, 255, 0.24)",
          borderWidth: 1,
          padding: 10,
          caretPadding: 6,
          callbacks: {
            title(context) {
              const code = String(context?.[0]?.label || "");
              return `${code}: ${odsDefinitions[code] || code}`;
            },
            label(context) {
              const code = String(context?.label || "");
              const value = Number(context?.parsed?.r ?? context?.raw ?? 0);
              const count = Number(context?.dataset?.countsMap?.[code] || 0);
              const totalCourses = Number(context?.dataset?.totalCourses || 0);
              return `${context?.dataset?.label || "Sèrie"}: ${formatPercent(value)}% (${formatCount(count)}/${formatCount(totalCourses)})`;
            }
          }
        }
      }
    }
  });

  state.charts.push(chart);
}

function getSelectedCentreCode() {
  return String(facultySelect.value || "");
}

function getSelectedProgrammeKey() {
  return String(degreeSelect.value || "");
}

function getSelectedSystemId() {
  return normalizeSystemId(String(systemSelect.value || DEFAULT_SYSTEM_ID));
}

function getSelectedSectionId() {
  return String(sectionSelect.value || DEFAULT_SECTION_ID);
}

function getSelectedOptionLabel(selectEl) {
  if (!selectEl || selectEl.selectedIndex < 0) return "";
  return normalizeWhitespace(selectEl.options[selectEl.selectedIndex]?.textContent || "");
}

function persistSharedFiltersFromControls() {
  writeSharedFilters({
    centreCode: getSelectedCentreCode(),
    programmeKey: getSelectedProgrammeKey(),
    systemId: getSelectedSystemId(),
    sectionId: getSelectedSectionId()
  });
}

function getCentreForRender(centreCode) {
  return state.centreByCode.get(String(centreCode || ""));
}

function getProgrammeForRender(programmeKeyValue) {
  return state.programmeByKey.get(String(programmeKeyValue || ""));
}

async function getCentreDetail(centreCode) {
  const key = String(centreCode || "");
  if (!key) throw new Error("Centre no seleccionat");
  if (state.centreDetailCache.has(key)) return state.centreDetailCache.get(key);

  const centre = state.centreByCode.get(key);
  if (!centre?.json) throw new Error(`Centre sense fitxer de detall: ${key}`);
  const detail = await fetchApiJson(`${state.apiVersion}/${centre.json}`);
  state.centreDetailCache.set(key, detail);
  return detail;
}

async function getProgrammeDetail(programmeKeyValue) {
  const key = String(programmeKeyValue || "");
  if (!key) throw new Error("Ensenyament no seleccionat");
  if (state.programmeDetailCache.has(key)) return state.programmeDetailCache.get(key);

  const programme = state.programmeByKey.get(key);
  if (!programme?.json) throw new Error(`Ensenyament sense fitxer de detall: ${key}`);
  const detail = await fetchApiJson(`${state.apiVersion}/${programme.json}`);
  state.programmeDetailCache.set(key, detail);
  return detail;
}

async function getCentreCoursesFromProgrammes(centreCode) {
  const key = String(centreCode || "");
  if (!key) throw new Error("Centre no seleccionat");
  if (state.centreCoursesCache.has(key)) return state.centreCoursesCache.get(key);

  const programmes = state.programmesByCentreCode.get(key) || [];
  if (!programmes.length) {
    state.centreCoursesCache.set(key, []);
    return [];
  }

  const programmeDetails = await Promise.all(
    programmes.map(async (programme) => {
      const pKey = programmeKey(programme?.centre_code, programme?.programme_code);
      try {
        return await getProgrammeDetail(pKey);
      } catch (error) {
        console.warn("No s'ha pogut carregar un ensenyament per al radar de centre:", pKey, error);
        return null;
      }
    })
  );

  const mergedCourses = [];
  const seenCourseKeys = new Set();
  programmeDetails.forEach((detailJson, idx) => {
    const programmeCode = String(programmes[idx]?.programme_code || "");
    const programmeCourses = Array.isArray(detailJson?.courses) ? detailJson.courses : [];
    programmeCourses.forEach((course, courseIdx) => {
      const uniqueKey = normalizeWhitespace(
        course?.centre_programme_course_code
        || `${programmeCode}::${course?.course_code || course?.document_number || ""}::${course?.academic_year || ""}::${courseIdx}`
      );
      if (!uniqueKey || seenCourseKeys.has(uniqueKey)) return;
      seenCourseKeys.add(uniqueKey);
      mergedCourses.push(course);
    });
  });

  state.centreCoursesCache.set(key, mergedCourses);
  return mergedCourses;
}

function buildRadarSubtitle(detailJson, fallbackCourses, distribution) {
  const totalCourses = Number(distribution?.totalCourses || 0) > 0
    ? Number(distribution.totalCourses)
    : resolveCourseCount(detailJson, fallbackCourses);
  const coursesWithOds = Number(distribution?.coursesWithOds || 0);
  const coveragePct = totalCourses > 0
    ? Number(((coursesWithOds * 100) / totalCourses).toFixed(1))
    : 0;
  return `${formatCount(totalCourses)} assignatures · amb algun ODS: ${formatPercent(coveragePct)}%`;
}

function updateExplainerPanel(context) {
  const systemId = normalizeSystemId(context?.systemId || getSelectedSystemId());
  const sectionId = String(context?.sectionId || getSelectedSectionId());
  const systemLabel = context?.systemLabel || getSelectedOptionLabel(systemSelect) || SYSTEM_LABEL_OVERRIDES[systemId] || systemId;
  const sectionLabel = context?.sectionLabel || getSelectedOptionLabel(sectionSelect) || SECTION_LABEL_OVERRIDES[sectionId] || sectionId;
  const systemHelp = SYSTEM_EXPLANATIONS[systemId] || "s'aplica el criteri del sistema seleccionat.";
  const sectionHelp = SECTION_EXPLANATIONS[sectionId] || "s'aplica el criteri de secció seleccionat.";

  if (!context?.centreCode) {
    if (explainerTitleEl) {
      explainerTitleEl.textContent = "Com interpretar el gràfic radar";
    }
    setExplainerText(
      explainerScopeEl,
      "Selecciona un centre i, opcionalment, un ensenyament per veure el percentatge d'assignatures de cada ODS."
    );
    setExplainerText(explainerCoverageEl, "");
    setExplainerText(explainerSystemEl, "");
    setExplainerText(explainerSectionEl, "");
    setExplainerText(explainerNotesEl, "");
    return;
  }

  const compareMode = Boolean(context?.compareMode);
  const centreName = normalizeWhitespace(context?.centreName || "Centre");
  const programmeName = normalizeWhitespace(context?.programmeName || "Ensenyament");
  const centreDistribution = context?.centreDistribution || null;
  const programmeDistribution = context?.programmeDistribution || null;

  if (explainerTitleEl) {
    explainerTitleEl.textContent = compareMode
      ? `Com interpretar la comparativa radar: ${centreName} vs ${programmeName}`
      : `Com interpretar el radar de ${centreName}`;
  }

  if (compareMode) {
    setExplainerText(
      explainerScopeEl,
      `S'està comparant el centre "${centreName}" amb l'ensenyament "${programmeName}".`
    );

    const centreCoverageText = centreDistribution
      ? `${formatCount(centreDistribution.coursesWithOds)} de ${formatCount(centreDistribution.totalCourses)} (${formatPercent(centreDistribution.coveragePct)}%)`
      : "n/d";
    const programmeCoverageText = programmeDistribution
      ? `${formatCount(programmeDistribution.coursesWithOds)} de ${formatCount(programmeDistribution.totalCourses)} (${formatPercent(programmeDistribution.coveragePct)}%)`
      : "n/d";

    setExplainerText(
      explainerCoverageEl,
      `Cobertura global amb ODS: centre ${centreCoverageText}; ensenyament ${programmeCoverageText}.`
    );
  } else {
    const scopeText = context?.nProgrammes > 0
      ? `Has seleccionat "${centreName}". Aquesta vista agrega ${formatCount(context.nProgrammes)} ensenyaments del centre.`
      : `Has seleccionat "${centreName}".`;
    setExplainerText(explainerScopeEl, scopeText);

    const coverageText = centreDistribution
      ? `${formatCount(centreDistribution.coursesWithOds)} de ${formatCount(centreDistribution.totalCourses)} assignatures amb ODS (${formatPercent(centreDistribution.coveragePct)}%).`
      : "No disponible per aquesta selecció.";
    setExplainerText(
      explainerCoverageEl,
      `Cobertura del centre: ${coverageText}`
    );
  }

  setExplainerText(
    explainerSystemEl,
    `Amb "${systemLabel}", ${systemHelp}`
  );
  setExplainerText(
    explainerSectionEl,
    `A la secció "${sectionLabel}", ${sectionHelp}`
  );
  setExplainerText(
    explainerNotesEl,
    compareMode
      ? "Es mostren dos radars: un per al centre i un per a l'ensenyament. Cada eix és un ODS, i el valor és el percentatge d'assignatures on apareix aquell ODS."
      : "Cada eix del radar representa un ODS. La distància al centre indica el percentatge d'assignatures on s'ha detectat aquell ODS."
  );
}

function renderEmptyState(message) {
  chartContainer.innerHTML = `<p style="text-align:center;padding:20px;">${message}</p>`;
  scheduleRadarChartHeaderHeightsSync();
}

async function render() {
  const centreCode = getSelectedCentreCode();
  const programmeKeyValue = getSelectedProgrammeKey();
  const systemId = getSelectedSystemId();
  const sectionId = getSelectedSectionId();
  const compareMode = Boolean(programmeKeyValue) && programmeKeyValue !== "ALL";

  chartContainer.innerHTML = "";
  clearCharts();

  if (!centreCode) {
    renderEmptyState("Selecciona un centre per veure el radar ODS.");
    setExplainerPanelVisible(false);
    updateExplainerPanel({
      centreCode: "",
      systemId,
      sectionId,
      systemLabel: getSelectedOptionLabel(systemSelect),
      sectionLabel: getSelectedOptionLabel(sectionSelect)
    });
    return;
  }

  const token = ++state.renderToken;
  renderEmptyState("Carregant dades...");

  try {
    const centre = getCentreForRender(centreCode);
    const centreDetailPromise = getCentreDetail(centreCode);
    const centreCoursesPromise = getCentreCoursesFromProgrammes(centreCode);
    const programmeDetailPromise = compareMode ? getProgrammeDetail(programmeKeyValue) : Promise.resolve(null);

    const [centreDetail, centreCourses, programmeDetail] = await Promise.all([
      centreDetailPromise,
      centreCoursesPromise,
      programmeDetailPromise
    ]);
    if (token !== state.renderToken) return;

    const centreDistribution = buildRadarDistributionFromCourses(centreCourses, systemId, sectionId);
    const hasCentreData = Number(centreDistribution.totalCourses || 0) > 0;

    let programmeDistribution = null;
    let hasProgrammeData = false;
    const programme = compareMode ? getProgrammeForRender(programmeKeyValue) : null;

    if (compareMode && programmeDetail) {
      programmeDistribution = buildRadarDistribution(programmeDetail, systemId, sectionId);
      hasProgrammeData = Number(programmeDistribution.totalCourses || 0) > 0;
    }

    const sharedRadarScale = buildSharedRadarScale([
      hasCentreData ? centreDistribution : null,
      compareMode && hasProgrammeData ? programmeDistribution : null
    ]);

    chartContainer.innerHTML = "";
    chartContainer.className = compareMode && hasProgrammeData ? "chart-grid two" : "chart-grid one";

    if (hasCentreData) {
      makeRadarChartCard(
        {
          title: centre?.centre_name || String(centreCode),
          subtitle: buildRadarSubtitle(centreDetail, centre?.n_courses, centreDistribution),
          distribution: centreDistribution,
          seriesLabel: "Centre",
          lineColor: "#314b66",
          axisScale: sharedRadarScale
        },
        chartContainer
      );
    }

    if (compareMode && hasProgrammeData && programmeDistribution) {
      makeRadarChartCard(
        {
          title: programme?.programme_name || "Ensenyament",
          subtitle: buildRadarSubtitle(programmeDetail, programme?.n_courses, programmeDistribution),
          distribution: programmeDistribution,
          seriesLabel: "Ensenyament",
          lineColor: "#8c2f39",
          axisScale: sharedRadarScale
        },
        chartContainer
      );
    }

    if (!hasCentreData && !(compareMode && hasProgrammeData)) {
      renderEmptyState("No hi ha dades d'assignatures per aquesta combinació de sistema i secció.");
    }

    scheduleRadarChartHeaderHeightsSync();

    updateExplainerPanel({
      centreCode,
      centreName: centre?.centre_name || String(centreCode),
      programmeName: programme?.programme_name || "",
      compareMode: compareMode && hasProgrammeData,
      systemId,
      sectionId,
      systemLabel: getSelectedOptionLabel(systemSelect),
      sectionLabel: getSelectedOptionLabel(sectionSelect),
      nProgrammes: (state.programmesByCentreCode.get(String(centreCode || "")) || []).length,
      centreDistribution,
      programmeDistribution
    });
    setExplainerPanelVisible(true);
  } catch (err) {
    console.error(err);
    chartContainer.innerHTML = `
      <div class="w3-panel w3-red w3-round">
        <h3>Error</h3>
        <p>No s'han pogut carregar les dades del gràfic radar des de l'API nova.</p>
      </div>`;
    scheduleRadarChartHeaderHeightsSync();
    updateExplainerPanel({
      centreCode,
      compareMode,
      systemId,
      sectionId,
      systemLabel: getSelectedOptionLabel(systemSelect),
      sectionLabel: getSelectedOptionLabel(sectionSelect)
    });
    setExplainerPanelVisible(Boolean(centreCode));
  }
}

function setControlsEnabled(enabled) {
  facultySelect.disabled = !enabled;
  degreeSelect.disabled = !enabled || !facultySelect.value;
  systemSelect.disabled = !enabled;
  sectionSelect.disabled = !enabled;
}

document.addEventListener("DOMContentLoaded", async () => {
  setRadarIntroPanelExpanded(false);
  if (radarIntroToggleBtn && radarIntroPanelEl) {
    radarIntroToggleBtn.addEventListener("click", () => {
      const expanded = radarIntroToggleBtn.getAttribute("aria-expanded") === "true";
      setRadarIntroPanelExpanded(!expanded);
    });
  }

  observeRadarSidebarLayoutState();
  setControlsEnabled(false);
  renderEmptyState("Inicialitzant dades de l'API...");
  setExplainerPanelVisible(false);
  setExplainerPanelCollapsed(false);
  updateExplainerPanel({
    centreCode: "",
    systemId: DEFAULT_SYSTEM_ID,
    sectionId: DEFAULT_SECTION_ID,
    systemLabel: SYSTEM_LABEL_OVERRIDES[DEFAULT_SYSTEM_ID],
    sectionLabel: SECTION_LABEL_OVERRIDES[DEFAULT_SECTION_ID]
  });

  if (radarPanelToggleBtn) {
    radarPanelToggleBtn.addEventListener("click", () => {
      setExplainerPanelCollapsed(!state.panelCollapsed);
    });
  }

  window.addEventListener("resize", () => {
    applyExplainerPanelCollapseUi();
  });

  try {
    await resolveApiBaseAndVersion();
    await loadIndexes();

    const sharedFilters = readSharedFilters();
    const defaultCentre = state.centres.find((centre) => centre.centre_name === DEFAULT_FACULTY_NAME);
    const defaultCentreCode = defaultCentre?.centre_code || state.centres[0]?.centre_code || "";
    const initialCentreCode = state.centreByCode.has(sharedFilters.centreCode)
      ? sharedFilters.centreCode
      : defaultCentreCode;

    populateFacultySelect(initialCentreCode);
    populateDegreeSelect(initialCentreCode, sharedFilters.programmeKey);
    populateSystemSelect(sharedFilters.systemId);
    populateSectionSelect(sharedFilters.sectionId);
    persistSharedFiltersFromControls();

    setControlsEnabled(true);
    await render();

    facultySelect.addEventListener("change", async () => {
      const centreCode = getSelectedCentreCode();
      populateDegreeSelect(centreCode, "");
      degreeSelect.disabled = !centreCode;
      persistSharedFiltersFromControls();
      await render();
    });

    degreeSelect.addEventListener("change", () => {
      persistSharedFiltersFromControls();
      render();
    });
    systemSelect.addEventListener("change", () => {
      persistSharedFiltersFromControls();
      render();
    });
    sectionSelect.addEventListener("change", () => {
      persistSharedFiltersFromControls();
      render();
    });
  } catch (err) {
    console.error(err);
    chartContainer.innerHTML = `
      <div class="w3-panel w3-red w3-round">
        <h3>Error</h3>
        <p>No s'ha pogut inicialitzar el gràfic radar amb l'API nova.</p>
      </div>`;
    if (explainerTitleEl) {
      explainerTitleEl.textContent = "Com interpretar el gràfic radar";
    }
    setExplainerText(explainerScopeEl, "No s'ha pogut inicialitzar el mòdul explicatiu del gràfic radar.");
    setExplainerText(explainerCoverageEl, "");
    setExplainerText(explainerSystemEl, "");
    setExplainerText(explainerSectionEl, "");
    setExplainerText(explainerNotesEl, "");
    setExplainerPanelVisible(false);
    setControlsEnabled(false);
  }
});
</script>
