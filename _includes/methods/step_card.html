<li class="methods-step-card{% if include.tone %} methods-step-card--{{ include.tone }}{% endif %}">

    <h4 class="methods-step-title">
      <span class="methods-step-badge">Pas {{ include.step }}</span>

  <div class="methods-step-body">
    {{ include.body }}
  </div>
</li>
