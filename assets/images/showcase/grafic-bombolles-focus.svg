<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Miniatura gràfic de bombolles ODS</title>
  <desc id="desc">Representació simplificada d'un gràfic de bombolles amb eixos i punts de diferents mides i colors.</desc>
  <rect width="900" height="520" fill="#f7f9fc"/>

  <g stroke="#d3dbe6" stroke-width="1">
    <line x1="90" y1="440" x2="860" y2="440"/>
    <line x1="90" y1="80" x2="90" y2="440"/>
    <line x1="180" y1="440" x2="180" y2="90"/>
    <line x1="270" y1="440" x2="270" y2="90"/>
    <line x1="360" y1="440" x2="360" y2="90"/>
    <line x1="450" y1="440" x2="450" y2="90"/>
    <line x1="540" y1="440" x2="540" y2="90"/>
    <line x1="630" y1="440" x2="630" y2="90"/>
    <line x1="720" y1="440" x2="720" y2="90"/>
    <line x1="810" y1="440" x2="810" y2="90"/>
    <line x1="90" y1="350" x2="860" y2="350"/>
    <line x1="90" y1="260" x2="860" y2="260"/>
    <line x1="90" y1="170" x2="860" y2="170"/>
