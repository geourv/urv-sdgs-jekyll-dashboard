    <circle cx="295" cy="348" r="14" fill="#2ec4b6" stroke="#22a093"/>
    <circle cx="332" cy="316" r="24" fill="#1982c4" stroke="#106ea7"/>
    <circle cx="380" cy="300" r="20" fill="#8ac926" stroke="#6ca51b"/>
    <circle cx="420" cy="288" r="13" fill="#e71d36" stroke="#bc1429"/>
    <circle cx="470" cy="270" r="28" fill="#ff9f1c" stroke="#d37f16"/>
    <circle cx="530" cy="242" r="22" fill="#2ec4b6" stroke="#22a093"/>
    <circle cx="590" cy="226" r="30" fill="#1982c4" stroke="#106ea7"/>
    <circle cx="640" cy="210" r="18" fill="#8ac926" stroke="#6ca51b"/>
